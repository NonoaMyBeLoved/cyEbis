<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cyEbis</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="upload-view" class="upload-view">
        <div class="brand-block">
          <p class="eyebrow">AI stem separation lab</p>
          <h1>cyEbis</h1>
          <p class="lead">
            음악 파일을 업로드하면 stem을 분리하고, 각 파트의 볼륨을 조절해 새 믹스를 만들 수 있습니다.
          </p>
        </div>

        <section class="upload-panel">
          <label class="drop-zone">
            <input id="file-input" type="file" accept="audio/*,.mp3,.wav,.m4a,.flac,.ogg" />
            <span id="file-name">음악 파일을 선택하세요</span>
            <small>MP3, WAV, M4A, FLAC, OGG 파일을 사용할 수 있습니다.</small>
          </label>

          <fieldset class="device-picker">
            <legend>처리 장치</legend>
            <label><input type="radio" name="device" value="auto" checked /> 자동</label>
            <label><input type="radio" name="device" value="cuda" /> GPU</label>
            <label><input type="radio" name="device" value="cpu" /> CPU</label>
            <small id="device-status" class="device-status">장치 정보를 확인하는 중...</small>
          </fieldset>

          <button id="process-button" class="primary-action" type="button" disabled>분리 시작</button>
          <div id="upload-progress" class="upload-progress hidden">
            <div><span id="message">대기 중</span><span id="percent">0%</span></div>
            <div class="progress-track"><div id="progress-fill"></div></div>
          </div>
        </section>
      </section>

      <section id="preview-view" class="preview-view hidden">
        <header class="preview-header">
          <div>
            <h1>분리 완료</h1>
          </div>
          <div class="preview-actions">
            <button id="back-upload-button" class="file-chip secondary" type="button">노래 다시 선택</button>
            <button id="download-mix-button" class="file-chip secondary" type="button">현재 믹스 다운로드</button>
          </div>
        </header>

        <section class="status-card">
          <strong id="status-title">Stem을 조절하고 원하는 믹스를 만드세요.</strong>
          <span id="status-copy">볼륨, mute, solo 상태는 믹스 다운로드에 반영됩니다.</span>
        </section>

        <section class="player">
          <div class="transport-line">
            <button id="play-toggle" class="play-main is-paused" type="button" aria-label="재생"><span></span></button>
            <div class="time-readout"><span id="current-time">00:00</span><span id="duration">/ 00:00</span></div>
          </div>

          <div id="track-stack" class="track-stack"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
